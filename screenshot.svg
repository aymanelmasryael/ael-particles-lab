<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="30%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0074FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00ffcc" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="800" height="500" fill="url(#bg)"/>
  <rect x="0" y="0" width="800" height="500" fill="url(#glow)"/>

  <!-- Decorative particles -->
  <circle cx="120" cy="80" r="2" fill="#0074FF" opacity="0.6"/>
  <circle cx="680" cy="120" r="1.5" fill="#00ffcc" opacity="0.5"/>
  <circle cx="350" cy="60" r="1" fill="#0074FF" opacity="0.4"/>
  <circle cx="550" cy="200" r="2.5" fill="#00ffcc" opacity="0.3"/>
  <circle cx="200" cy="350" r="1.5" fill="#0074FF" opacity="0.5"/>
  <circle cx="650" cy="400" r="2" fill="#00ffcc" opacity="0.4"/>
  <circle cx="400" cy="450" r="1" fill="#0074FF" opacity="0.6"/>
  <circle cx="100" cy="250" r="3" fill="#0074FF" opacity="0.15"/>
  <circle cx="720" cy="300" r="2" fill="#00ffcc" opacity="0.2"/>

  <!-- Top bar -->
  <rect x="25" y="20" width="750" height="55" rx="12" fill="rgba(5,12,24,0.7)" stroke="rgba(0,116,255,0.4)" stroke-width="1"/>
  <text x="45" y="55" fill="#eef2ff" font-family="monospace" font-size="14" font-weight="bold">AYMAN ELMASRY</text>
  <text x="175" y="55" fill="#8db7ff" font-family="monospace" font-size="11">AEL Digital Studio</text>
  <circle cx="710" cy="47" r="5" fill="#ef4444">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="725" y="52" fill="#ef4444" font-family="monospace" font-size="9" font-weight="bold">ONLINE</text>

  <!-- Title -->
  <text x="400" y="125" fill="#ffffff" font-family="monospace" font-size="26" font-weight="bold" text-anchor="middle">AEL PARTICLES LAB <tspan fill="#00ffcc" font-size="14">v3.2</tspan></text>
  <text x="400" y="150" fill="#9ab3e6" font-family="monospace" font-size="11" text-anchor="middle">Sovereign Edition — High-Density Particle Simulation Engine</text>

  <!-- Stats row: 4 cards -->
  <rect x="50" y="170" width="160" height="65" rx="10" fill="rgba(5,12,24,0.6)" stroke="rgba(0,116,255,0.3)" stroke-width="1"/>
  <text x="130" y="200" fill="#ffffff" font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle">100</text>
  <text x="130" y="220" fill="#8db7ff" font-family="monospace" font-size="10" text-anchor="middle">Taxonomy Classes</text>

  <rect x="230" y="170" width="160" height="65" rx="10" fill="rgba(5,12,24,0.6)" stroke="rgba(0,116,255,0.3)" stroke-width="1"/>
  <text x="310" y="200" fill="#ffffff" font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle">10</text>
  <text x="310" y="220" fill="#8db7ff" font-family="monospace" font-size="10" text-anchor="middle">Physics Layers</text>

  <rect x="410" y="170" width="160" height="65" rx="10" fill="rgba(5,12,24,0.6)" stroke="rgba(255,215,0,0.3)" stroke-width="1"/>
  <text x="490" y="200" fill="#ffd700" font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle">12</text>
  <text x="490" y="220" fill="#ffd700" font-family="monospace" font-size="10" text-anchor="middle">Behaviors</text>

  <rect x="590" y="170" width="160" height="65" rx="10" fill="rgba(5,12,24,0.6)" stroke="rgba(0,255,204,0.3)" stroke-width="1"/>
  <text x="680" y="200" fill="#00ffcc" font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle">10K</text>
  <text x="680" y="220" fill="#00ffcc" font-family="monospace" font-size="10" text-anchor="middle">Particles / Layer</text>

  <!-- Prompt bar -->
  <rect x="50" y="255" width="700" height="50" rx="10" fill="rgba(5,12,24,0.7)" stroke="rgba(0,116,255,0.35)" stroke-width="1"/>
  <text x="65" y="275" fill="#00ffcc" font-family="monospace" font-size="10" font-weight="bold">▶ PROMPT › PARTICLE</text>
  <rect x="65" y="286" width="500" height="28" rx="6" fill="rgba(1,5,14,0.8)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="75" y="306" fill="#4a5a7a" font-family="monospace" font-size="11">Describe what you want in natural language...</text>
  <rect x="585" y="286" width="55" height="28" rx="6" fill="rgba(0,116,255,0.2)" stroke="rgba(0,116,255,0.4)" stroke-width="1"/>
  <text x="612" y="306" fill="#0074FF" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">⚡ GO</text>

  <!-- Layer particles visualization -->
  <rect x="50" y="320" width="340" height="90" rx="10" fill="rgba(5,12,24,0.6)" stroke="rgba(0,116,255,0.25)" stroke-width="1"/>
  <text x="65" y="340" fill="#0074FF" font-family="monospace" font-size="10" font-weight="bold">LAYER 01: GRAVITY WELL</text>
  <text x="65" y="358" fill="#ffffff" font-family="monospace" font-size="11">A gravitational singularity pulling streams</text>
  <text x="65" y="374" fill="#ffffff" font-family="monospace" font-size="11">of particles into an orbital dance...</text>
  <!-- Orbit ring -->
  <ellipse cx="340" cy="365" rx="25" ry="10" fill="none" stroke="rgba(0,116,255,0.3)" stroke-width="1"/>
  <circle cx="340" cy="365" r="3" fill="#0074FF"/>
  <circle cx="355" cy="362" r="2" fill="#00ffcc" opacity="0.6"/>

  <rect x="410" y="320" width="340" height="90" rx="10" fill="rgba(5,12,24,0.6)" stroke="rgba(0,116,255,0.25)" stroke-width="1"/>
  <text x="425" y="340" fill="#0074FF" font-family="monospace" font-size="10" font-weight="bold">LAYER 05: FLOCK SWARM</text>
  <text x="425" y="358" fill="#ffffff" font-family="monospace" font-size="11">Boids algorithm driving emergent</text>
  <text x="425" y="374" fill="#ffffff" font-family="monospace" font-size="11">flocking patterns across 3,000 particles...</text>
  <!-- Flock dots -->
  <circle cx="700" cy="340" r="1.5" fill="#0074FF" opacity="0.6"/>
  <circle cx="705" cy="350" r="1.5" fill="#0074FF" opacity="0.4"/>
  <circle cx="695" cy="348" r="1.5" fill="#00ffcc" opacity="0.5"/>
  <circle cx="710" cy="345" r="1" fill="#0074FF" opacity="0.3"/>

  <!-- Bottom row layers -->
  <rect x="50" y="425" width="340" height="50" rx="10" fill="rgba(5,12,24,0.6)" stroke="rgba(255,215,0,0.2)" stroke-width="1" opacity="0.6"/>
  <text x="65" y="445" fill="#ffd700" font-family="monospace" font-size="10" font-weight="bold">🔒 LAYER 08: ELECTRIC STORM</text>
  <text x="65" y="462" fill="#9ab3e6" font-family="monospace" font-size="10">UNLOCK with Ultra-Lock System™</text>

  <rect x="410" y="425" width="340" height="50" rx="10" fill="rgba(5,12,24,0.6)" stroke="rgba(255,215,0,0.2)" stroke-width="1" opacity="0.6"/>
  <text x="425" y="445" fill="#ffd700" font-family="monospace" font-size="10" font-weight="bold">🔒 LAYER 10: QUANTUM FOAM</text>
  <text x="425" y="462" fill="#9ab3e6" font-family="monospace" font-size="10">UNLOCK with Ultra-Lock System™</text>

  <!-- Footer -->
  <rect x="25" y="485" width="750" height="0" rx="0" fill="none"/>
  <text x="400" y="490" fill="#64748b" font-family="monospace" font-size="10" text-anchor="middle">© 2026 Ayman Elmasry — AEL Digital Studio | Particles Lab v3.0 — Sovereign Edition | Ultra-Lock System™</text>
</svg>
